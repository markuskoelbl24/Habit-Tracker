// ── Datums-Helfer (lokale Zeit, Montag-basiert) ──────────────────────────────
function isoDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function mondayOf(d){const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());return addDays(x,-((x.getDay()+6)%7));}
function isoWeek(d){const x=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));x.setUTCDate(x.getUTCDate()-((x.getUTCDay()+6)%7)+3);const f=new Date(Date.UTC(x.getUTCFullYear(),0,4));return 1+Math.round(((x-f)/864e5-3+((f.getUTCDay()+6)%7))/7);}
const TODAY_DATE=new Date();
const TODAY_ISO=isoDate(TODAY_DATE);
const THIS_MONDAY=mondayOf(TODAY_DATE);
const TODAY=(TODAY_DATE.getDay()+6)%7; // Index heute in der Woche (Mo=0 … So=6)

const YEAR_START_MONDAY=mondayOf(new Date(YEAR,0,4));                 // Montag der ISO-Woche 1 (enthält immer den 1. Donnerstag → Label „Jan" in jedem Jahr)
const WEEKS=Math.round((mondayOf(new Date(YEAR,11,31))-YEAR_START_MONDAY)/(7*864e5))+1; // Spalten Jan→Dez
const CW=Math.round((THIS_MONDAY-YEAR_START_MONDAY)/(7*864e5));        // Index der laufenden Woche im Jahr
function weekMonday(wOff){return addDays(THIS_MONDAY,wOff*7);}         // Wochenansicht: Versatz von heute
function colMonday(i){return addDays(YEAR_START_MONDAY,i*7);}          // Heatmap-Spalte i (0=Jan) → Montag

// Erledigte aktive Tage einer Woche zählen (dateMap = {iso:1})
function weekDoneCount(dateMap,monday,active){
  let n=0;
  for(let i=0;i<7;i++){if(active.includes(i)&&dateMap[isoDate(addDays(monday,i))])n++;}
  return n;
}

// Jahresdaten je Habit: 52 Wochen, Index 51 = laufende Woche
function computeYearData(profile,habits,profilDays){
  const out={};
  habits.forEach(h=>{
    const active=h.activeDays||[0,1,2,3,4,5,6];
    const dateMap=(profilDays[profile]&&profilDays[profile][h.id])||{};
    const arr=Array(WEEKS).fill(null);
    for(let i=0;i<WEEKS;i++){
      const mon=colMonday(i);
      if(mon>THIS_MONDAY){arr[i]=null;continue;}                                  // Zukunft → leer
      const done=weekDoneCount(dateMap,mon,active);
      if(i===CW)            arr[i]=done>=h.weekGoal?"full":null;                 // läuft noch → nur „full" oder offen
      else if(done===0)     arr[i]=null;                                          // keine Daten = nicht getrackt
      else                  arr[i]=done>=h.weekGoal?"full":done>=h.weekGoal-1?"almost":"miss";
    }
    out[h.id]=arr;
  });
  return out;
}

// Streak aus echten Daten rückwärts (über Jahreswechsel hinweg):
// laufende Woche bricht die Serie NICHT, solange sie noch nicht vorbei ist
function streakOf(dateMap,active,weekGoal){
  dateMap=dateMap||{};active=active||[0,1,2,3,4,5,6];
  let s=0;
  if(weekDoneCount(dateMap,THIS_MONDAY,active)>=weekGoal)s++;   // diese Woche zählt nur, wenn schon erreicht
  for(let w=1;w<520;w++){
    if(weekDoneCount(dateMap,addDays(THIS_MONDAY,-w*7),active)>=weekGoal)s++;else break;
  }
  return s;
}

// ── GitHub Gist Sync ──────────────────────────────────────────────────────────
const GIST_FILE="habits.json";
async function gistPull(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{
    headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});
  if(!r.ok)throw new Error(r.status===401?"Token ungültig":r.status===404?"Gist nicht gefunden":("HTTP "+r.status));
  const j=await r.json();
  const file=j.files&&(j.files[GIST_FILE]||Object.values(j.files)[0]);
  if(!file)return null;
  let content=file.content;
  if(file.truncated&&file.raw_url)content=await(await fetch(file.raw_url)).text();
  return content?JSON.parse(content):null;
}
async function gistPush(token,gistId,data){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{
    method:"PATCH",
    headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
    body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(data,null,2)}}})});
  if(!r.ok)throw new Error(r.status===401?"Token ungültig":r.status===404?"Gist nicht gefunden":("HTTP "+r.status));
  return true;
}

function useHeatScroll(dep,multiplier=0.8){
  const sr=useRef(null),cr=useRef(null);
  const place=()=>{
    const c=sr.current,t=cr.current;
    if(c&&t&&t.offsetLeft>0)c.scrollLeft=Math.max(0,t.offsetLeft+BOX/2-c.offsetWidth*multiplier);
  };
  // Vor dem ersten Paint positionieren → kein sichtbares Springen / Flash beim Wechsel
  React.useLayoutEffect(place,[dep]);
  // Nachkorrektur, falls die Inter-Schrift erst nach dem Layout fertig lädt (Spaltenbreiten)
  useEffect(()=>{
    let n=0;const go=()=>{place();if(++n<4)setTimeout(go,150);};
    const id=setTimeout(go,120);return()=>clearTimeout(id);
  },[dep]);
  return{scrollRef:sr,curRef:cr};
}

function boxBg(s){
  if(s===null)  return "rgba(148,163,184,0.07)";
  if(s==="full")  return "#22c55e";
  if(s==="almost")return "#ea580c";
  return "var(--heat-miss)";
}

// ── useReorder: Sortieren per Pointer (Long-Press / ☰-Griff), Karte folgt dem Finger ──
function useReorder(items,getId,onCommit){
  const[drag,setDrag]=useState(null); // {id,from,to,h0,startY,dy}
  const rowRefs=useRef({});
  const rectsRef=useRef([]);
  const press=useRef(null);
  const timer=useRef(null);
  const capRef=useRef(null);

  const begin=(id,y,pid,el)=>{
    const rects=items.map(it=>{const n=rowRefs.current[getId(it)];const r=n?n.getBoundingClientRect():{top:0,height:0};return{mid:r.top+r.height/2,height:r.height};});
    rectsRef.current=rects;
    const from=items.findIndex(it=>getId(it)===id);if(from<0)return;
    setDrag({id,from,to:from,h0:rects[from]?.height||60,startY:y,dy:0});
    if(el&&pid!=null){try{el.setPointerCapture(pid);capRef.current={el,pid};}catch(e){}}
  };

  useEffect(()=>{
    if(!drag)return;
    const onMove=e=>{
      if(e.cancelable)e.preventDefault();
      const y=e.clientY,rects=rectsRef.current;
      let to=rects.length-1;
      for(let i=0;i<rects.length;i++){if(y<rects[i].mid){to=i;break;}}
      setDrag(d=>d?{...d,to,dy:y-d.startY}:d);
    };
    const onUp=()=>{
      setDrag(d=>{
        if(d&&d.to!==d.from){const arr=[...items];const[m]=arr.splice(d.from,1);arr.splice(d.to,0,m);onCommit(arr);}
        return null;
      });
      if(capRef.current){try{capRef.current.el.releasePointerCapture(capRef.current.pid);}catch(e){}capRef.current=null;}
    };
    window.addEventListener("pointermove",onMove,{passive:false});
    window.addEventListener("pointerup",onUp);
    window.addEventListener("pointercancel",onUp);
    return()=>{window.removeEventListener("pointermove",onMove);window.removeEventListener("pointerup",onUp);window.removeEventListener("pointercancel",onUp);};
  },[drag,items,onCommit]);

  const rowStyle=(item,idx)=>{
    if(!drag)return{position:"relative"};
    if(getId(item)===drag.id)return{transform:`translateY(${drag.dy}px) scale(1.03)`,zIndex:50,boxShadow:"0 12px 28px rgba(0,0,0,0.45)",position:"relative",transition:"none"};
    let shift=0;
    if(drag.from<drag.to&&idx>drag.from&&idx<=drag.to)shift=-drag.h0;
    else if(drag.from>drag.to&&idx>=drag.to&&idx<drag.from)shift=drag.h0;
    return{transform:`translateY(${shift}px)`,transition:"transform 0.18s ease",position:"relative"};
  };

  // Gesten am ganzen Element: Long-Press (Touch) bzw. vertikaler Zug (Maus) startet Sortieren; onSwipe optional
  const handlers=(item,onSwipe)=>({
    onPointerDown:e=>{
      if(e.target.closest("input,textarea,button,select,[contenteditable]"))return;
      press.current={id:getId(item),x:e.clientX,y:e.clientY,mode:null,ptype:e.pointerType,pid:e.pointerId,el:e.currentTarget};
      timer.current=setTimeout(()=>{const g=press.current;if(g&&g.mode===null){g.mode="reorder";begin(g.id,g.y,g.pid,g.el);}},300);
    },
    onPointerMove:e=>{
      const g=press.current;if(!g||g.mode==="reorder")return;
      const dx=e.clientX-g.x,dy=e.clientY-g.y;
      if(g.mode===null){
        if(onSwipe&&Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)){g.mode="swipe";clearTimeout(timer.current);}
        else if(Math.abs(dy)>8&&Math.abs(dy)>=Math.abs(dx)){clearTimeout(timer.current);if(g.ptype==="mouse"){g.mode="reorder";begin(g.id,g.y,g.pid,g.el);}else{press.current=null;}return;}
      }
      if(g.mode==="swipe"&&onSwipe)onSwipe(g.id,Math.max(-80,Math.min(0,dx)),false);
    },
    onPointerUp:()=>{clearTimeout(timer.current);const g=press.current;if(g&&g.mode==="swipe"&&onSwipe)onSwipe(g.id,null,true);press.current=null;},
    onPointerCancel:()=>{clearTimeout(timer.current);press.current=null;},
  });

  // ☰-Griff: sofort greifen (kein Long-Press nötig)
  const handleProps=item=>({
    onPointerDown:e=>{e.stopPropagation();if(e.cancelable)e.preventDefault();begin(getId(item),e.clientY,e.pointerId,e.currentTarget);},
    style:{touchAction:"none",cursor:"grab",userSelect:"none",WebkitUserSelect:"none"},
  });

  return{drag,rowRefs,rowStyle,handlers,handleProps};
}

function SetupPanel({profName,habits,setHabits,isNew,onNameSave,onCreate,otherProfiles=[],allHabits={},onToggleShare,onDeleteProfile}){

      <div key={h.id} ref={n=>{reorder.rowRefs.current[h.id]=n;}}
        {...reorder.handlers(h,onSwipe)}
        style={{...reorder.rowStyle(h,idx),touchAction:"pan-y"}}
      >

          <div className="card" onClick={()=>setEditId(editId===h.id?null:h.id)}
            style={{borderColor:editId===h.id?h.color+"55":"var(--card-border)",userSelect:"none",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span onPointerDown={hp.onPointerDown} onClick={e=>e.stopPropagation()}
                style={{...hp.style,color:"#475569",fontSize:18,padding:"0 6px 0 2px"}}>☰</span>
              <span style={{fontSize:18,pointerEvents:"none"}}>{h.emoji}</span>
              <span style={{fontWeight:600,fontSize:14,color:"var(--txt-strong)",flex:1}}>{h.name}</span>
              <span style={{fontSize:11,color:"#64748b"}}>{h.weekGoal}×</span>
              <span style={{color:"#64748b",fontSize:11,padding:"2px 8px"}}>{editId===h.id?"▲":"▼"}</span>
            </div>
            {editId===h.id&&(<div onClick={e=>e.stopPropagation()} style={{marginTop:14,paddingTop:12,borderTop:"1px solid var(--divider)",display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <p style={{fontSize:11,color:"#64748b",marginBottom:6}}>Name</p>
                <input value={h.name} onChange={e=>upd(h.id,"name",e.target.value)}
                  style={{width:"100%",background:"var(--input-bg)",border:"1px solid var(--input-border)",borderRadius:8,padding:"8px 12px",color:"var(--txt-strong)",fontFamily:"inherit",fontSize:16}}/>
              </div>
              <div>
                <p style={{fontSize:11,color:"#64748b",marginBottom:6}}>Emoji</p>
                <button onClick={()=>setEmojiPickerId(emojiPickerId===h.id?null:h.id)}
                  style={{width:50,height:40,background:"var(--input-bg)",border:`1px solid ${emojiPickerId===h.id?h.color:"var(--input-border)"}`,
                    borderRadius:8,fontSize:20,lineHeight:1,cursor:"pointer",textAlign:"center"}}>{h.emoji}</button>
                {emojiPickerId===h.id&&(
                  <div style={{marginTop:8,padding:8,background:"var(--surface-soft)",
                    border:"1px solid var(--card-border)",borderRadius:10,maxHeight:240,overflowY:"auto"}}>
                    {EMOJI_CATS.map(cat=>(
                      <div key={cat.n} style={{marginBottom:6}}>
                        <p style={{fontSize:10,color:"var(--txt-dim)",margin:"2px 2px 5px",fontWeight:500}}>{cat.n}</p>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {cat.e.map((em,k)=>(
                            <button key={cat.n+k} onClick={()=>{upd(h.id,"emoji",em);setEmojiPickerId(null);}}
                              style={{width:34,height:34,fontSize:19,lineHeight:1,border:"none",cursor:"pointer",borderRadius:8,
                                background:em===h.emoji?h.color+"33":"transparent"}}>{em}</button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div>
                <p style={{fontSize:11,color:"#64748b",marginBottom:6}}>Wochenziel</p>
                <div style={{display:"flex",gap:5}}>
                  {[1,2,3,4,5,6,7].map(n=>(<button key={n}
                    onClick={e=>{e.stopPropagation();upd(h.id,"weekGoal",n);}}
                    style={{flex:1,height:36,borderRadius:8,border:"1px solid",
                      borderColor:h.weekGoal===n?h.color:"var(--input-border)",
                      background:h.weekGoal===n?h.color+"22":"transparent",
                      color:h.weekGoal===n?h.color:"var(--txt-dim)",fontFamily:"inherit",fontSize:13,cursor:"pointer"}}>{n}</button>))}
                </div>
              </div>
              <div>
                <p style={{fontSize:11,color:"#64748b",marginBottom:6}}>Aktive Tage</p>
                <div style={{display:"flex",gap:4}}>
                  {DAYS.map((d,i)=>{
                    const on=(h.activeDays||[]).includes(i);
                    return(<button key={d} onClick={e=>{e.stopPropagation();tDay(h.id,i);}}
                      style={{flex:1,height:34,borderRadius:8,border:"1px solid",
                        borderColor:on?h.color:"var(--input-border)",background:on?h.color+"22":"transparent",
                        color:on?h.color:"#64748b",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>{d}</button>);
                  })}
                </div>
              </div>
              {otherProfiles.length>0&&(<div>
                <p style={{fontSize:11,color:"#64748b",marginBottom:6}}>Teilen mit</p>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {otherProfiles.map(op=>{
                    const shared=(allHabits[op]||[]).some(ph=>ph.name===h.name);
                    return(<div key={op} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"7px 12px",borderRadius:10,background:"var(--surface-soft)",
                      border:"1px solid var(--border-soft)"}}>
                      <span style={{fontSize:13,color:"var(--txt)"}}>{op}</span>
                      {shared
                        ?<span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,
                            fontWeight:500,color:"#22c55e",padding:"5px 4px"}}>✓ Geteilt</span>
                        :<button onClick={e=>{e.stopPropagation();onToggleShare(h,op,true);}}
                          style={{display:"inline-flex",alignItems:"center",gap:5,borderRadius:20,
                            border:"1px solid var(--dash-border)",background:"transparent",
                            color:"var(--txt-dim)",padding:"5px 12px",fontFamily:"inherit",
                            fontSize:12,fontWeight:500,cursor:"pointer",transition:"all 0.15s"}}>
                          + Teilen
                        </button>}
                    </div>);
                  })}
                </div>
              </div>)}
            </div>)}
          </div>
        </SwipeRow>
      </div>);
    })}
    <button onClick={add}
      style={{background:"var(--surface-soft)",border:"1px dashed var(--dash-border)",
        color:"var(--txt-dim)",borderRadius:18,padding:"0.875rem",fontFamily:"inherit",fontSize:14,cursor:"pointer",width:"100%"}}>
      + Neuen Habit erstellen
    </button>
  </div>);
}

// ── WocheView ─────────────────────────────────────────────────────────────────
function WocheView({habits,profileDays,wOff,weekLabel,onNavigate,onDayToggle,yearData}){
  return(<React.Fragment>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <button className="wbtn" disabled={wOff<=-(WEEKS-1)} onClick={()=>onNavigate(-1)}>←</button>
      <span style={{fontSize:13,color:"var(--txt-dim)",fontWeight:500}}>{weekLabel()}</span>
      <button className="wbtn" disabled={wOff>=0} onClick={()=>onNavigate(1)}>→</button>
    </div>
    <div key={wOff} style={{display:"flex",flexDirection:"column",gap:"0.875rem",animation:"fadeIn 0.2s ease"}}>
      {habits.map(h=>{
        const mon=weekMonday(wOff);
        const dateMap=profileDays[h.id]||{};
        const active=h.activeDays||[0,1,2,3,4,5,6];
        const dayIso=i=>isoDate(addDays(mon,i));
        const prog=active.reduce((s,i)=>s+(dateMap[dayIso(i)]?1:0),0);
        const pct=Math.min(100,(prog/h.weekGoal)*100);
        const done=pct>=100;
        const streak=wOff===0?streakOf(profileDays[h.id]||{},active,h.weekGoal):0;
        return(<div key={h.id} className="card" style={{boxShadow:done?`0 0 0 1px ${h.color}55`:"none",transition:"box-shadow 0.3s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <span style={{fontSize:18}}>{h.emoji}</span>
              <div>
                <p style={{fontWeight:600,fontSize:15,color:"var(--txt-strong)",lineHeight:1.5}}>{h.name}</p>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <p style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>mind. {h.weekGoal}× / Woche</p>
                  {streak>=2&&<span style={{fontSize:11,color:"#f97316",display:"inline-flex",alignItems:"center",gap:3}}>
                    <span className="fire">🔥</span>{streak} Wo.
                  </span>}
                </div>
              </div>
            </div>
            <span style={{fontSize:13,fontWeight:700,color:done?h.color:pct>=70?"#f97316":"#64748b",display:"inline-flex",alignItems:"center",gap:3}}>
              {prog}/{h.weekGoal}{done&&<span style={{fontSize:11}}>✦</span>}
            </span>
          </div>
          <div style={{display:"flex",gap:5,marginBottom:12}}>
            {DAYS.map((d,i)=>{
              const iso=dayIso(i);
              const isA=active.includes(i),isFut=iso>TODAY_ISO,isDone=!!dateMap[iso]&&!isFut,isToday=iso===TODAY_ISO;
              return(<div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                cursor:isA&&!isFut?"pointer":"default",userSelect:"none"}}
                onClick={()=>isA&&!isFut&&onDayToggle(h.id,i)}>
                <div style={{width:"100%",height:36,borderRadius:10,display:"flex",alignItems:"center",
                  justifyContent:"center",fontSize:15,transition:"background 0.15s",
                  background:!isA?"transparent":isDone?`${h.color}28`:isFut?"var(--surface-faint)":"var(--field)",
                  border:isToday?`1px solid ${h.color}77`:!isA||isFut?"1px dashed var(--border-soft)":"1px solid var(--card-border)",
                  color:!isA?"var(--faint)":isDone?h.color:isFut?"var(--faint)":"#475569"}}>
                  {!isA?"–":isDone?"✓":isFut?"":"○"}
                </div>
                <span style={{fontSize:9,color:isToday?"var(--txt)":"#64748b",fontWeight:isToday?600:400}}>
                  {isToday?"●":d}
                </span>
              </div>);
            })}
          </div>
          <div className="pbar">
            <div className="pfill" style={{width:`${pct}%`,background:done?h.color:pct>=70?"#f97316":"#334155",
              boxShadow:done?`0 0 10px ${h.color}66`:"none",transition:"width 0.4s ease, box-shadow 0.3s"}}/>
          </div>
        </div>);
      })}
    </div>
  </React.Fragment>);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const saved=loadState();
  const[profiles,setProfiles]=useState(saved?.profiles||["Marilena","Markus"]);
  const[activePro,setActivePro]=useState(()=>{
    const p=saved?.profiles||["Marilena","Markus"];
    return p.includes(saved?.activePro)?saved.activePro:p[0];
  });
  const[tab,setTab]=useState("woche");
  const[alleMode,setAlleMode]=useState(false);
  const[setupMode,setSetupMode]=useState(false);
  const[setupPro,setSetupPro]=useState(activePro);
  const[isNewProf,setIsNewProf]=useState(false);
  const[profilHabits,setProfilHabits]=useState(saved?.profilHabits||{"Marilena":mkH(),"Markus":mkH()});
  const[newProfHabits,setNewProfHabits]=useState(mkH());
  const[profilDays,setProfilDays]=useState(saved?.profilDays||{"Marilena":{},"Markus":{}});
  const[heatId,setHeatId]=useState(null);
  const[heatDep,setHeatDep]=useState(0);
  const[wOff,setWOff]=useState(0);
  const[ghToken,setGhToken]=useState(()=>{try{return localStorage.getItem("ght_token")||"";}catch(e){return"";}});
  const[ghGist,setGhGist]=useState(()=>{try{return localStorage.getItem("ght_gist")||"";}catch(e){return"";}});
  const[syncStatus,setSyncStatus]=useState("idle"); // idle | syncing | ok | error
  const[syncMsg,setSyncMsg]=useState("");
  const[showSync,setShowSync]=useState(false);
  const skipPush=useRef(false);
  const touchX=useRef(null);
  const touchY=useRef(null);
  const profReorder=useReorder(profiles,p=>p,setProfiles);

  // ── Tag/Nacht: System folgen, manuell übersteuerbar ──
  const[themeMode,setThemeMode]=useState(()=>{try{return localStorage.getItem("ht_theme")||"system";}catch(e){return"system";}});
  const[sysDark,setSysDark]=useState(()=>!window.matchMedia||window.matchMedia("(prefers-color-scheme: dark)").matches);
  const resolvedTheme=themeMode==="system"?(sysDark?"dark":"light"):themeMode;
  useEffect(()=>{
    const mq=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)");
    if(!mq)return;
    const fn=e=>setSysDark(e.matches);
    mq.addEventListener?mq.addEventListener("change",fn):mq.addListener(fn);
    return()=>{mq.removeEventListener?mq.removeEventListener("change",fn):mq.removeListener(fn);};
  },[]);
  useEffect(()=>{
    document.documentElement.dataset.theme=resolvedTheme;
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta)meta.setAttribute("content",resolvedTheme==="dark"?"#111118":"#f6f7f9");
    try{localStorage.setItem("ht_theme",themeMode);}catch(e){}
  },[themeMode,resolvedTheme]);
  const toggleTheme=()=>setThemeMode(resolvedTheme==="dark"?"light":"dark");

  // ── Persistenz: bei jeder Datenänderung speichern ──
  useEffect(()=>{
    saveState({profiles,activePro,profilHabits,profilDays});
  },[profiles,activePro,profilHabits,profilDays]);

  const computedYearDataAll=React.useMemo(()=>{
    const o={};
    profiles.forEach(p=>{o[p]=computeYearData(p,profilHabits[p]||[],profilDays);});
    return o;
  },[profiles,profilHabits,profilDays]);

  const activeHabits=profilHabits[activePro]||[];
  const activeYearData=computedYearDataAll[activePro]||{};
  const setupHabits=isNewProf?newProfHabits:(profilHabits[setupPro]||mkH());
  const setSetupHabits=isNewProf?setNewProfHabits:(h=>setProfilHabits(p=>({...p,[setupPro]:h})));

  const navigate=dir=>{const n=wOff+dir;if(n<-(WEEKS-1)||n>0)return;setWOff(n);};
  const toggleDay=(hid,di)=>{
    const iso=isoDate(addDays(weekMonday(wOff),di));
    if(iso>TODAY_ISO)return; // Zukunft nicht abhakbar
    setProfilDays(p=>{
      const prof=p[activePro]||{},hd={...(prof[hid]||{})};
      if(hd[iso])delete hd[iso];else hd[iso]=1;
      return{...p,[activePro]:{...prof,[hid]:hd}};
    });
  };
  const weekLabel=()=>{
    const mon=weekMonday(wOff),sun=addDays(mon,6),kw=isoWeek(mon);
    const range=`${mon.getDate()}.–${sun.getDate()}. ${MONTHS[sun.getMonth()]}`;
    if(wOff===0)return`KW ${kw} · Diese Woche`;
    if(wOff===-1)return`KW ${kw} · Letzte Woche`;
    return`KW ${kw} · ${range}`;
  };

  const enterSetup=()=>{setSetupPro(activePro);setIsNewProf(false);setSetupMode(true);};
  const exitSetup=()=>{if(!isNewProf)setActivePro(setupPro);setSetupMode(false);setIsNewProf(false);};

  const handleProfilClick=p=>{
    if(setupMode){setSetupPro(p);setIsNewProf(false);}
    else{
      setActivePro(p);
      setAlleMode(false);
      if(tab==="year")setHeatDep(d=>d+1);
    }
  };

  const handlePlusClick=()=>{setIsNewProf(true);setNewProfHabits(mkH());if(!setupMode)setSetupMode(true);};
  const handleNameSave=(oldN,newN)=>{
    if(!newN||newN===oldN)return;
    setProfiles(p=>p.map(x=>x===oldN?newN:x));
    setProfilHabits(p=>{const q={...p};q[newN]=q[oldN];delete q[oldN];return q;});
    setProfilDays(p=>{const q={...p};q[newN]=q[oldN];delete q[oldN];return q;});
    if(activePro===oldN)setActivePro(newN);setSetupPro(newN);
  };
  const handleCreate=(name)=>{
    const h=newProfHabits;
    setProfiles(p=>[...p,name]);
    setProfilHabits(p=>({...p,[name]:h}));
    setProfilDays(p=>({...p,[name]:{}}));
    setActivePro(name);setSetupPro(name);setIsNewProf(false);setNewProfHabits(mkH());
  };
  const handleDeleteProfile=(name)=>{
    const remaining=profiles.filter(p=>p!==name);
    setProfiles(remaining);
    setProfilHabits(p=>{const q={...p};delete q[name];return q;});
    setProfilDays(p=>{const q={...p};delete q[name];return q;});
    if(activePro===name)setActivePro(remaining[0]||"");
    if(remaining.length>0){setSetupPro(remaining[0]);setIsNewProf(false);}
    // bei 0 verbleibenden übernimmt der Onboarding-Effekt unten
  };
  const handleTabClick=id=>{setTab(id);setHeatDep(d=>d+1);};
  const handleAlleClick=()=>{setAlleMode(a=>!a);setHeatDep(d=>d+1);};
  const toggleShareHabit=(habit,target,on)=>{
    setProfilHabits(p=>{
      const list=p[target]||[];
      const exists=list.some(h=>h.name===habit.name);
      if(on&&!exists){
        const copy={...habit,id:Date.now()+Math.floor(Math.random()*100000)};
        return{...p,[target]:[...list,copy]};
      }
      if(!on&&exists)return{...p,[target]:list.filter(h=>h.name!==habit.name)};
      return p;
    });
  };

  // ── Sync: Verbinden (Pull, bei leerem Gist initial Push) ──
  const connectSync=async()=>{
    const t=ghToken.trim(),g=ghGist.trim();
    if(!t||!g){setSyncStatus("error");setSyncMsg("Token und Gist-ID ausfüllen");return;}
    setSyncStatus("syncing");setSyncMsg("Verbinde …");
    try{
      const remote=await gistPull(t,g);
      try{localStorage.setItem("ght_token",t);localStorage.setItem("ght_gist",g);}catch(e){}
      if(remote&&remote.version===DATA_VERSION&&remote.profiles){
        skipPush.current=true;
        setProfiles(remote.profiles);
        setProfilHabits(remote.profilHabits||{});
        setProfilDays(remote.profilDays||{});
        if(!remote.profiles.includes(activePro))setActivePro(remote.profiles[0]);
        setSyncMsg("Daten geladen ✓");
      }else{
        await gistPush(t,g,{version:DATA_VERSION,profiles,profilHabits,profilDays,ts:Date.now()});
        setSyncMsg(remote?"Gist neu aufgesetzt ✓":"Gist initialisiert ✓");
      }
      setSyncStatus("ok");setShowSync(false);
    }catch(e){setSyncStatus("error");setSyncMsg(e.message);}
  };
  const disconnectSync=()=>{
    try{localStorage.removeItem("ght_token");localStorage.removeItem("ght_gist");}catch(e){}
    setGhToken("");setGhGist("");setSyncStatus("idle");setSyncMsg("");
  };

  // Beim Start automatisch laden, falls schon verbunden
  useEffect(()=>{
    const t=ghToken,g=ghGist;
    if(!t||!g)return;
    setSyncStatus("syncing");
    gistPull(t,g).then(remote=>{
      if(remote&&remote.version===DATA_VERSION&&remote.profiles){
        skipPush.current=true;
        setProfiles(remote.profiles);
        setProfilHabits(remote.profilHabits||{});
        setProfilDays(remote.profilDays||{});
      }
      setSyncStatus("ok");
    }).catch(e=>{setSyncStatus("error");setSyncMsg(e.message);});
  },[]); // nur einmal beim Laden

  // Nach jeder Datenänderung automatisch hochladen (gebündelt, 1,2 s Verzögerung)
  useEffect(()=>{
    if(syncStatus==="idle"||syncStatus==="error"||!ghToken||!ghGist)return;
    if(skipPush.current){skipPush.current=false;return;}
    const id=setTimeout(()=>{
      setSyncStatus("syncing");
      gistPush(ghToken,ghGist,{version:DATA_VERSION,profiles,profilHabits,profilDays,ts:Date.now()})
        .then(()=>setSyncStatus("ok"))
        .catch(e=>{setSyncStatus("error");setSyncMsg(e.message);});
    },1200);
    return()=>clearTimeout(id);
  },[profiles,profilHabits,profilDays]); // eslint-disable-line

  const syncColor={idle:"#f87171",error:"#f87171",syncing:"#d9920b",ok:"#16a34a"}[syncStatus];
  const syncLabel={idle:"Verbinden",error:"Fehler",syncing:"Synct …",ok:"Verbunden"}[syncStatus];

  // Onboarding: keine Profile (frischer Start / alle gelöscht) → direkt Namenseingabe
  useEffect(()=>{
    if(profiles.length===0){setSetupMode(true);setIsNewProf(true);setSetupPro("");setNewProfHabits(mkH());}
  },[profiles.length]);

  const activeBtn=setupMode?(isNewProf?"__new__":setupPro):(alleMode?null:activePro);
  const isAlleActive=alleMode&&!setupMode;

  return(<div style={{minHeight:"100vh",background:"var(--bg)",fontFamily:"'Inter',sans-serif",
    color:"var(--txt)",maxWidth:480,margin:"0 auto"}}
    onTouchStart={e=>{touchX.current=e.touches[0].clientX;touchY.current=e.touches[0].clientY;}}
    onTouchEnd={e=>{
      if(touchX.current===null||tab!=="woche"||alleMode||setupMode){touchX.current=null;return;}
      const dx=e.changedTouches[0].clientX-touchX.current;
      const dy=e.changedTouches[0].clientY-(touchY.current||0);
      touchX.current=null;
      // nur als Wochenwechsel werten, wenn klar horizontal: genug Strecke UND deutlich mehr X als Y
      if(Math.abs(dx)<70||Math.abs(dx)<Math.abs(dy)*2)return;
      if(dx<0&&wOff<0)navigate(1);if(dx>0&&wOff>-(WEEKS-1))navigate(-1);
    }}>
    <style>{`
      *{box-sizing:border-box;margin:0;padding:0;}
      html[data-theme="dark"]{--bg:#111118;--txt:#e2e8f0;--txt-dim:#94a3b8;--txt-strong:#fff;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--input-bg:rgba(255,255,255,0.05);--input-border:rgba(255,255,255,0.1);--input-focus:rgba(255,255,255,0.28);--divider:rgba(255,255,255,0.07);--border-soft:rgba(255,255,255,0.06);--surface-soft:rgba(255,255,255,0.03);--surface-faint:rgba(255,255,255,0.02);--dash-border:rgba(255,255,255,0.15);--chip-on-bg:rgba(255,255,255,0.1);--chip-on-border:rgba(255,255,255,0.25);--heat-miss:#1e293b;--faint:#1a2035;--field:rgba(255,255,255,0.05);--scroll:#1e293b;}
      html[data-theme="light"]{--bg:#ebedf1;--txt:#334155;--txt-dim:#6f7a8a;--txt-strong:#1e293b;--card-bg:#f4f6f8;--card-border:#e0e3e9;--input-bg:#ecf0f4;--input-border:#d8dce3;--input-focus:#bcc3ce;--divider:#e3e6eb;--border-soft:#e6e9ee;--surface-soft:#edf0f4;--surface-faint:#eef1f4;--dash-border:#ccd1d9;--chip-on-bg:#1e293b;--chip-on-border:#1e293b;--heat-miss:#d6dde6;--faint:#dde1e8;--field:#ebedf1;--scroll:#cbd5e1;}
      ::-webkit-scrollbar{width:3px;height:3px;}
      ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px;}
      input{font-size:16px;}input:focus{outline:none;border-color:var(--input-focus)!important;}
      .card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:1.25rem;}
      .pbar{height:7px;background:var(--divider);border-radius:4px;overflow:hidden;}
      .pfill{height:100%;border-radius:4px;}
      .tab{background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;color:#64748b;padding:7px 16px;border-radius:10px;transition:all 0.15s;font-weight:500;}
      .tab.on{background:var(--divider);color:var(--txt);}
      .profbtn{background:none;border:1px solid var(--input-border);border-radius:20px;padding:5px 14px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;color:#64748b;font-weight:500;transition:all 0.15s;}
      .profbtn.on{background:var(--chip-on-bg);color:#fff;border-color:var(--chip-on-border);}
      .rbtn{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:5px 14px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;font-weight:500;color:#64748b;transition:all 0.15s;}
      .rbtn.on{background:var(--chip-on-bg);color:#fff;border-color:var(--chip-on-border);}
      .rbtn.green{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:#16a34a;}
      .wbtn{background:var(--card-bg);border:1px solid var(--card-border);color:#64748b;border-radius:8px;padding:6px 14px;font-family:'Inter',sans-serif;font-size:15px;cursor:pointer;}
      .wbtn:disabled{opacity:0.2;cursor:default;}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes flame{0%,100%{transform:scaleY(1) scaleX(1);filter:brightness(1)}25%{transform:scaleY(1.18) scaleX(0.88);filter:brightness(1.2)}60%{transform:scaleY(1.28) scaleX(0.84);filter:brightness(1.35)}80%{transform:scaleY(1.1) scaleX(0.94);filter:brightness(1.1)}}
      .fire{display:inline-block;animation:flame 1.4s ease-in-out infinite;transform-origin:bottom center;}
      @keyframes medalDrop{from{opacity:0;transform:translateY(-30px) scale(0.8)}to{opacity:1;transform:translateY(0) scale(1)}}
      @keyframes medalBounce{0%{transform:scale(0.5)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
    `}</style>

    {/* ── Header ── */}
    <div style={{position:setupMode?"relative":"sticky",top:0,zIndex:20,
      background:"var(--bg)",borderBottom:"1px solid var(--divider)",padding:"1.25rem 1.25rem 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.875rem"}}>
        <div>
          <p style={{fontSize:12,color:"#64748b",marginBottom:3,lineHeight:1.5}}>{todayLabel()}</p>
          <h1 style={{fontSize:21,fontWeight:700,color:"var(--txt-strong)",lineHeight:1.5}}>Habit Tracker</h1>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setShowSync(s=>!s)}
            style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,padding:"4px 10px",
              borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontWeight:500,border:"none",
              background:syncStatus==="ok"?"rgba(34,197,94,0.1)":syncStatus==="syncing"?"rgba(251,191,36,0.1)":"rgba(239,68,68,0.1)",
              color:syncColor}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:syncColor,display:"inline-block"}}/>
            {syncLabel}
          </button>
          <button onClick={toggleTheme} aria-label="Hell/Dunkel umschalten"
            style={{background:"var(--card-bg)",border:"1px solid var(--input-border)",
              color:"var(--txt)",borderRadius:8,padding:"5px 9px",fontFamily:"inherit",fontSize:14,
              cursor:"pointer",lineHeight:1,transition:"all 0.2s"}}>
            {resolvedTheme==="dark"?"☾":"☀"}
          </button>
          <button onClick={setupMode?exitSetup:enterSetup} aria-label="Setup"
            style={{
              background:setupMode?"var(--chip-on-bg)":"var(--card-bg)",
              border:`1px solid ${setupMode?"var(--chip-on-border)":"var(--input-border)"}`,
              color:setupMode?"#fff":"var(--txt-strong)",
              borderRadius:8,padding:"5px 10px",fontFamily:"inherit",fontSize:15,lineHeight:1,
              cursor:"pointer",transition:"all 0.2s"
            }}>⚙</button>
        </div>
      </div>
      {showSync&&(<div style={{marginBottom:"0.875rem"}}>
        <div className="card">
          <p style={{fontSize:13,fontWeight:600,color:"var(--txt-strong)",marginBottom:10}}>GitHub Gist Sync</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div>
              <p style={{fontSize:11,color:"#64748b",marginBottom:4}}>Fine-grained Token (github_pat_…)</p>
              <input type="password" placeholder="github_pat_xxxxxxxx" value={ghToken}
                onChange={e=>setGhToken(e.target.value)}
                style={{width:"100%",background:"var(--input-bg)",border:"1px solid var(--input-border)",borderRadius:8,padding:"8px 12px",color:"var(--txt-strong)",fontFamily:"inherit",fontSize:16}}/>
            </div>
            <div>
              <p style={{fontSize:11,color:"#64748b",marginBottom:4}}>Gist-ID (aus der Gist-URL)</p>
              <input placeholder="z. B. a1b2c3d4e5f6…" value={ghGist}
                onChange={e=>setGhGist(e.target.value)}
                style={{width:"100%",background:"var(--input-bg)",border:"1px solid var(--input-border)",borderRadius:8,padding:"8px 12px",color:"var(--txt-strong)",fontFamily:"inherit",fontSize:16}}/>
            </div>
            <button onClick={connectSync} disabled={syncStatus==="syncing"}
              style={{background:"rgba(34,197,94,0.12)",border:"1px solid rgba(34,197,94,0.25)",color:"#22c55e",
                borderRadius:10,padding:"10px",fontFamily:"inherit",fontSize:14,fontWeight:600,
                cursor:syncStatus==="syncing"?"default":"pointer",opacity:syncStatus==="syncing"?0.6:1}}>
              {syncStatus==="syncing"?"…":"Verbinden & Daten laden"}
            </button>
            {(syncStatus==="ok"||syncStatus==="error")&&syncMsg&&(
              <p style={{fontSize:11,color:syncStatus==="error"?"#f87171":"#22c55e"}}>{syncMsg}</p>
            )}
            {(ghToken||ghGist)&&(
              <button onClick={disconnectSync}
                style={{background:"none",border:"1px solid var(--input-border)",color:"var(--txt-dim)",
                  borderRadius:10,padding:"8px",fontFamily:"inherit",fontSize:13,cursor:"pointer"}}>
                Trennen & lokale Zugangsdaten löschen
              </button>
            )}
          </div>
          <p style={{fontSize:10,color:"#475569",marginTop:8}}>Token & Gist-ID nur lokal gespeichert · selber Token+ID auf jedem Gerät = gemeinsamer Sync</p>
        </div>
      </div>)}
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",paddingBottom:"0.875rem"}}>
        {profiles.map(p=>(
          <button key={p} className={`profbtn${activeBtn===p?" on":""}`} onClick={()=>handleProfilClick(p)}>{p}</button>
        ))}
        <button className={`profbtn${activeBtn==="__new__"?" on":""}`} style={{borderStyle:"dashed"}} onClick={handlePlusClick}>+</button>
        {setupMode
          ?(profiles.length>0&&<button className="rbtn green" style={{marginLeft:"auto"}} onClick={exitSetup}>Fertig</button>)
          :<button className={`rbtn${alleMode?" on":""}`} style={{marginLeft:"auto"}} onClick={handleAlleClick}>Alle</button>
        }
      </div>
    </div>

    {!setupMode&&(<div style={{display:"flex",padding:"0.75rem 1rem 0",gap:4}}>
      {[["woche","Woche"],["year","Jahr"]].map(([id,l])=>(
        <button key={id} className={`tab${tab===id?" on":""}`} onClick={()=>handleTabClick(id)}>{l}</button>
      ))}
    </div>)}

    <div style={{padding:"1rem 1.25rem 3rem",display:"flex",flexDirection:"column",gap:"0.875rem"}}>

      {setupMode&&(<SetupPanel key={isNewProf?"__new__":setupPro}
        profName={isNewProf?"":setupPro} habits={setupHabits} setHabits={setSetupHabits}
        isNew={isNewProf} onNameSave={n=>handleNameSave(setupPro,n)} onCreate={handleCreate}
        otherProfiles={isNewProf?[]:profiles.filter(p=>p!==setupPro)}
        allHabits={profilHabits} onToggleShare={toggleShareHabit}
        onDeleteProfile={isNewProf?null:()=>handleDeleteProfile(setupPro)}/>
      )}

      {!setupMode&&tab==="woche"&&!alleMode&&(
        <WocheView habits={activeHabits} profileDays={profilDays[activePro]||{}}
          wOff={wOff} weekLabel={weekLabel} onNavigate={navigate} onDayToggle={toggleDay} yearData={activeYearData}/>
      )}

      {!setupMode&&tab==="woche"&&alleMode&&profiles.map((p,idx)=>{
        const pd=profilDays[p]||{},ph=profilHabits[p]||[];
        const hp=profReorder.handleProps(p);
        return(<div key={p} ref={n=>{profReorder.rowRefs.current[p]=n;}}
          {...profReorder.handlers(p)}
          style={{...profReorder.rowStyle(p,idx),touchAction:"pan-y"}}
        >
          <div className="card" style={{userSelect:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span onPointerDown={hp.onPointerDown}
                style={{...hp.style,color:"#475569",fontSize:16,padding:"0 6px 0 2px"}}>☰</span>
              <button onClick={e=>{e.stopPropagation();setActivePro(p);setAlleMode(false);}}
                style={{background:"none",border:"none",fontWeight:700,fontSize:15,color:"var(--txt-strong)",
                  cursor:"pointer",fontFamily:"inherit",padding:0,flex:1,textAlign:"left",userSelect:"none"}}>
                {p}
              </button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {ph.map(h=>{
                const dateMap=pd[h.id]||{};
                const active=h.activeDays||[0,1,2,3,4,5,6];
                const prog=active.reduce((s,i)=>s+(dateMap[isoDate(addDays(THIS_MONDAY,i))]?1:0),0);
                const pct=Math.min(100,(prog/h.weekGoal)*100);
                return(<div key={h.id}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,color:"var(--txt-dim)"}}>{h.emoji} {h.name}</span>
                    <span style={{fontSize:12,fontWeight:500,color:pct>=100?h.color:pct>=70?"#f97316":"#64748b"}}>{prog}/{h.weekGoal}</span>
                  </div>
                  <div className="pbar"><div className="pfill" style={{width:`${pct}%`,background:pct>=100?h.color:pct>=70?"#f97316":"#334155",transition:"width 0.4s"}}/></div>
                </div>);
              })}
            </div>
          </div>
        </div>);
      })}

      {!setupMode&&tab==="year"&&!alleMode&&(<React.Fragment>
        <p style={{fontSize:13,color:"var(--txt-dim)"}}>Jahresübersicht {new Date().getFullYear()}</p>
        <ProfilHeatmap habits={activeHabits} yearData={activeYearData} daysData={profilDays[activePro]||{}}
          activeId={heatId} setActiveId={setHeatId} dep={heatDep}/>
      </React.Fragment>)}

      {!setupMode&&tab==="year"&&alleMode&&(<React.Fragment>
        <p style={{fontSize:13,color:"var(--txt-dim)"}}>Jahresübersicht {new Date().getFullYear()} · Alle Profile</p>
        <UebersichtHeatmap profilHabits={profilHabits} profiles={profiles}
          computedYearDataAll={computedYearDataAll} profilDays={profilDays} dep={heatDep}/>
      </React.Fragment>)}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
